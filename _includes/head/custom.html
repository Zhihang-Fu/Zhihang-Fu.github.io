{% include base_path %}

<!-- start custom head snippets -->

<!-- Inter Font - Modern Sans-serif (Anthropic Style) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Favicon and app icons -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/mstile-144x144.png">
<link rel="icon" type="image/png" sizes="32x32" href="{{ base_path }}/images/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="{{ base_path }}/images/favicon.ico">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<link rel="shortcut icon" href="{{ base_path }}/images/favicon.ico">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-TileImage" content="{{ base_path }}/images/mstile-144x144.png">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.min.css"/>


<!-- Support for MathJax - only load on pages with math content -->
<script>
  // Check if page needs MathJax by looking for math delimiters
  if (document.documentElement.textContent.search(/\$\$|\\\(|\\\[|\\begin{align}/) !== -1) {
    var polyfill = document.createElement('script');
    polyfill.src = 'https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6';
    document.head.appendChild(polyfill);
    
    var mathjax = document.createElement('script');
    mathjax.id = 'MathJax-script';
    mathjax.async = true;
    mathjax.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
    document.head.appendChild(mathjax);
  }
</script>

<!-- end custom head snippets -->
